name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vet
        run: go vet ./...

      - name: Lint
        run: |
          go install github.com/golangci/golangci-lint/cmd/golangci-lint@v2.1.6
          golangci-lint run --timeout=5m

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

      - name: Shim tests
        run: cd shim && node --test test/*.test.js

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic -p 1 ./internal/...
          go tool cover -func=coverage.out | tail -1

      - name: Build
        run: go build -trimpath -o c2c .

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
