name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Vet
        run: go vet ./...

      - name: Lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.1.6
          args: --timeout=5m

      - name: Test
        run: go test -race -count=1 -timeout 120s ./...

      - name: Shim tests
        run: cd shim && node --test test/sdk.test.js test/subpath.test.js test/auth.test.js test/shim-fixes.test.js
        timeout-minutes: 2

      - name: Coverage
        run: |
          go test -coverprofile=coverage.out -covermode=atomic -p 1 ./internal/...
          go tool cover -func=coverage.out | tail -1

      - name: Build
        run: go build -trimpath -o c2c .

      - name: Security scan
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...
